<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Análisis Profesional de Recibos CFE</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; padding: 20px; max-width: 1000px; margin: auto; }
h1 { text-align:center; }
table { border-collapse: collapse; width: 100%; margin-top: 20px; }
th, td { border: 1px solid #ddd; padding: 8px; text-align:center; }
th { background:#f2f2f2; }
button { margin-top:10px; margin-right:10px; }
.loading { color:blue; }
.error { color:red; }
.ok { color:green; }
canvas { margin-top:30px; }
</style>
</head>

<body>

<h1>Análisis Profesional de Recibos CFE</h1>

<input type="file" id="fileInput" accept=".pdf">
<button onclick="procesarPDF()">Agregar Recibo</button>
<button onclick="limpiarDatos()">Borrar Historial</button>

<div id="estado"></div>
<div id="tablaPagos"></div>
<div id="estadisticas"></div>

<canvas id="grafica"></canvas>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

let registros = JSON.parse(localStorage.getItem("registrosCFE")) || [];
let chart;

mostrarTabla();
calcularEstadisticas();
crearGrafica();

async function procesarPDF() {

    const file = document.getElementById('fileInput').files[0];
    if (!file) return alert("Selecciona un PDF");

    document.getElementById("estado").innerHTML =
        '<p class="loading">Procesando recibo...</p>';

    try {

        const buffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({data: buffer}).promise;

        let texto = '';

        for (let i=1; i<=pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            texto += content.items.map(item => item.str).join('') + ' ';
        }

        texto = texto.replace(/\s+/g,' ').trim();

        if (!texto.includes("Comisión Federal de Electricidad") &&
            !texto.includes("CFE370814QI0")) {

            document.getElementById("estado").innerHTML =
                '<p class="error">No es un recibo válido de CFE.</p>';
            return;
        }

        const datos = extraerDatosCFE(texto);

        if (datos.totalPagar === "No encontrado") {
            document.getElementById("estado").innerHTML =
                '<p class="error">No se encontró el total.</p>';
            return;
        }

        const total = parseFloat(datos.totalPagar.replace(/,/g, ""));

        registros.push({ 
            nombre: datos.nombre,
            total: total,
            datosCompletos: datos
        });

        localStorage.setItem("registrosCFE", JSON.stringify(registros));

        document.getElementById("estado").innerHTML =
            `<p class="ok">Recibo agregado: ${datos.nombre} - $${total.toFixed(2)}</p>`;

        mostrarDatosDetectados(datos);
        mostrarTabla();
        calcularEstadisticas();
        actualizarGrafica();

    } catch (e) {
        document.getElementById("estado").innerHTML =
            `<p class="error">Error: ${e.message}</p>`;
    }
}

function extraerDatosCFE(texto) {

    function extraer(regex, grupo=1) {
        const m = texto.match(regex);
        return m ? m[grupo].trim() : "No encontrado";
    }

    const bloqueMatch = texto.match(
        /Ciudad de México\.\s*(.*?)\s*NO\.\s*DE\s*SERVICIO/i
    );

    let bloque = bloqueMatch ? bloqueMatch[1] : "";
    bloque = bloque.replace(/\s+/g, " ").trim();

    let nombre = "No encontrado";
    let direccion = "No encontrado";

    if (bloque) {

        const indiceNumero = bloque.search(/\d/);

        if (indiceNumero > 0) {
            let corte = bloque.lastIndexOf(" ", indiceNumero);
            if (corte === -1) corte = indiceNumero;

            nombre = bloque.substring(0, corte).trim();
            direccion = bloque.substring(corte).trim();
        } else {
            nombre = bloque;
        }
    }

    return {
        nombre: nombre,
        direccion: direccion,
        numServicio: extraer(/NO\.\s*DE\s*SERVICIO:\s*(\d+)/i),
        cuenta: extraer(/CUENTA:\s*([A-Z0-9]+)/i),
        limitePago: extraer(/LÍMITE\s+DE\s+PAGO:\s*([0-9]{1,2}\s+[A-Z]{3}\s+[0-9]{2,4})/i),
        corte: extraer(/CORTE\s+A\s+PARTIR:\s*([0-9]{1,2}\s+[A-Z]{3}\s+[0-9]{2,4})/i),
        tarifa: extraer(/TARIFA:\s*([A-Z0-9]+)/i),
        medidor: extraer(/NO\.\s*MEDIDOR:\s*([A-Z0-9]+)/i),
        totalPagar: extraer(/TOTAL\s+A\s+PAGAR[:\s]*\$?\s*([\d,]+(?:\.\d{2})?)/i)
    };
}

function mostrarDatosDetectados(datos){

    let html = "<h3>Datos Detectados</h3><table>";
    html += "<tr><th>Campo</th><th>Valor</th></tr>";

    for (let campo in datos) {
        html += `<tr><td>${campo}</td><td>${datos[campo]}</td></tr>`;
    }

    html += "</table>";

    document.getElementById("estado").innerHTML += html;
}

function mostrarTabla(){

    let html = "<h3>Historial de Pagos</h3>";
    html += "<table>";
    html += "<tr><th>#</th><th>Nombre</th><th>Total ($)</th></tr>";

    registros.forEach((r, index) => {
        html += `<tr>
                    <td>${index+1}</td>
                    <td>${r.nombre}</td>
                    <td>${r.total.toFixed(2)}</td>
                 </tr>`;
    });

    html += "</table>";

    document.getElementById("tablaPagos").innerHTML = html;
}

function calcularEstadisticas(){

    if (registros.length === 0) {
        document.getElementById("estadisticas").innerHTML = "";
        return;
    }

    const valores = registros.map(r => r.total);
    const n = valores.length;
    const suma = valores.reduce((a,b)=>a+b,0);
    const media = suma / n;

    const varianza = valores.reduce((acc, valor) => {
        return acc + Math.pow(valor - media, 2);
    }, 0) / (n - 1 || 1);

    const desviacion = Math.sqrt(varianza);

    document.getElementById("estadisticas").innerHTML = `
        <h3>Resultados Estadísticos</h3>
        <p><strong>N:</strong> ${n}</p>
        <p><strong>Media:</strong> $${media.toFixed(2)}</p>
        <p><strong>Varianza:</strong> ${varianza.toFixed(2)}</p>
        <p><strong>Desviación Estándar:</strong> ${desviacion.toFixed(2)}</p>
    `;
}

function crearGrafica(){

    const ctx = document.getElementById('grafica').getContext('2d');

    chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: registros.map(r => r.nombre),
            datasets: [{
                label: 'Pago ($)',
                data: registros.map(r => r.total)
            }]
        },
        options: { responsive: true }
    });
}

function actualizarGrafica(){

    chart.data.labels = registros.map(r => r.nombre);
    chart.data.datasets[0].data = registros.map(r => r.total);
    chart.update();
}

function limpiarDatos(){
    localStorage.removeItem("registrosCFE");
    registros = [];
    mostrarTabla();
    calcularEstadisticas();
    actualizarGrafica();
    document.getElementById("estado").innerHTML =
        '<p class="ok">Historial borrado.</p>';
}

</script>

</body>
</html>
